<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Stimulation Clicker (100 Upgrades)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #0a0a0c; color: #fff;
            display: flex; height: 100vh; overflow: hidden;
            transition: background 0.1s;
        }
        /* Layout */
        #click-section {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1a24 0%, #0a0a0c 100%);
            position: relative;
        }
        #shop-section {
            width: 450px; border-left: 2px solid #222;
            background-color: #121216; display: flex;
            flex-direction: column; z-index: 10;
        }
        #shop-header {
            padding: 20px; background: #181822;
            border-bottom: 1px solid #222; text-align: center;
        }
        #shop-list {
            flex: 1; overflow-y: scroll; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        /* UI Elements */
        #score-display { font-size: 3rem; font-weight: 900; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        #cps-display { font-size: 1.2rem; color: #888; margin-bottom: 20px; }
        #click-btn {
            width: 200px; height: 200px; border-radius: 50%;
            border: none; background: linear-gradient(135deg, #00ffcc, #0077ff);
            color: white; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 30px rgba(0,255,204,0.4);
            transition: transform 0.05s, box-shadow 0.1s;
            z-index: 5;
        }
        #click-btn:active { transform: scale(0.92); box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        
        /* Shop Items */
        .shop-item {
            background: #1c1c24; border: 1px solid #333;
            padding: 12px; border-radius: 8px; display: flex;
            justify-content: space-between; align-items: center;
            transition: 0.2s; cursor: pointer;
        }
        .shop-item:hover:not(.disabled) { background: #252532; border-color: #00ffcc; }
        .shop-item.disabled { opacity: 0.4; cursor: not-allowed; }
        .item-info { display: flex; flex-direction: column; gap: 4px; }
        .item-name { font-weight: bold; font-size: 1rem; color: #fff; }
        .item-cost { font-size: 0.85rem; color: #ffcc00; }
        .item-effect { font-size: 0.75rem; color: #aaa; }
        .item-count { font-size: 1.5rem; font-weight: bold; color: #555; }
        .shop-item:not(.disabled) .item-count { color: #00ffcc; }

        /* Brainrot Visuals */
        .floating-text {
            position: fixed; pointer-events: none; font-weight: bold;
            font-size: 20px; z-index: 2; animation: floatUp 1.5s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        .bouncing-bg {
            position: fixed; font-weight: 900; opacity: 0.15;
            pointer-events: none; white-space: nowrap; z-index: 1;
        }
        .video-popup {
            position: fixed; z-index: 3; border: 3px solid #ff0055;
            background: #000; pointer-events: auto; box-shadow: 0 0 20px rgba(255,0,85,0.5);
        }
    </style>
</head>
<body>

    <div id="click-section">
        <div id="score-display">0</div>
        <div id="cps-display">ความฟินต่อวินาที (CPS): 0 | พลังคลิก: 1</div>
        <button id="click-btn">CLICK ME</button>
    </div>

    <div id="shop-section">
        <div id="shop-header">
            <h2>🛒 ตลาดละลายสมอง</h2>
            <p style="color: #666; font-size: 0.85rem; margin: 0;">ซื้อสิ่งเร้าเพื่อเพิ่มพลังของคุณ</p>
        </div>
        <div id="shop-list"></div>
    </div>

    <script>
        let score = 0;
        let cpc = 1; // Click per click
        let cps = 0; // Click per second
        let totalChaosLevel = 0;

        // วัตถุดิบชื่อไอเทม 100 ชิ้น ไล่ระดับความกาวและความแพง
        const rawItems = [
            { name: "กดสิวฟินๆ", baseCost: 15, cpcAdd: 1, cpsAdd: 0, desc: "+1 พลังคลิก" },
            { name: "คลิปสไลม์หนึบหนับ", baseCost: 50, cpcAdd: 0, cpsAdd: 0.5, desc: "+0.5 CPS" },
            { name: "ทรายไฮดรอลิกโดนบด", baseCost: 120, cpcAdd: 0, cpsAdd: 2, desc: "+2 CPS" },
            { name: "เพลง Lofi แซมเปิ้ลฝนตก", baseCost: 300, cpcAdd: 2, cpsAdd: 0, desc: "+2 พลังคลิก" },
            { name: "วิดีโอตัดเค้กเนียนๆ", baseCost: 600, cpcAdd: 0, cpsAdd: 8, desc: "+8 CPS" },
            { name: "ASMR เสียงกระซิบเคี้ยวแตงกวา", baseCost: 1200, cpcAdd: 0, cpsAdd: 15, desc: "+15 CPS" },
            { name: "Subway Surfers เกมเพลย์ครึ่งจอ", baseCost: 2500, cpcAdd: 5, cpsAdd: 25, desc: "เริ่มความป่วน +25 CPS" },
            { name: "Minecraft Parkour กระโดดข้ามลาวา", baseCost: 6000, cpcAdd: 0, cpsAdd: 60, desc: "+60 CPS" },
            { name: "คลิปรีดกีบเท้าม้า", baseCost: 14000, cpcAdd: 15, cpsAdd: 120, desc: "+120 CPS" },
            { name: "พอดแคสต์คดีฆาตกรรมหลอนๆ", baseCost: 32000, cpcAdd: 0, cpsAdd: 300, desc: "+300 CPS" },
            { name: "มุกสกีบีดี้โตเล็ตไอเดียกาว", baseCost: 75000, cpcAdd: 50, cpsAdd: 700, desc: "ระดับสมองไหล" },
            { name: "คลิปขูดหินปูนสุนัข", baseCost: 150000, cpcAdd: 0, cpsAdd: 1500, desc: "+1500 CPS" },
            { name: "คนอินเดียขุดสระว่ายน้ำด้วยมือเปล่า", baseCost: 350000, cpcAdd: 0, cpsAdd: 4000, desc: "+4000 CPS" },
            { name: "ไลฟ์สดนอนหลับให้คนปาของขวัญ", baseCost: 800000, cpcAdd: 200, cpsAdd: 9000, desc: "นอนก็รวยได้" },
            { name: "คลิปทำลายไอโฟนด้วยเครื่องกดไฮดรอลิก", baseCost: 2000000, cpcAdd: 0, cpsAdd: 22000, desc: "+22k CPS" },
            { name: "สอนรวยด่วนใน 30 วินาทีโดยโค้ชโนเนม", baseCost: 5000000, cpcAdd: 500, cpsAdd: 50000, desc: "สลัดความคิดจน" },
            { name: "สปีดรันบอส Elden Ring มือเดียว", baseCost: 12000000, cpcAdd: 0, cpsAdd: 120000, desc: "+120k CPS" },
            { name: "เพลงรีมิกซ์แดนซ์สามช่าติดหู", baseCost: 30000000, cpcAdd: 0, cpsAdd: 280000, desc: "โจ๊ะๆ เข้าไป" },
            { name: "แกะกล่องสุ่มโมเดลราคาแสนศุกร์", baseCost: 75000000, cpcAdd: 2500, cpsAdd: 650000, desc: "เกลือล้วนๆ" },
            { name: "AI ร้องเพลงลูกทุ่งไทย", baseCost: 180000000, cpcAdd: 0, cpsAdd: 1500000, desc: "อัจฉริยะทางดนตรี" }
        ];

        // เติมไอเทมให้ครบ 100 ชิ้นด้วยคณิตศาสตร์ (สเกลชื่อและเอฟเฟกต์ตามความแพง)
        const items = [];
        const suffixes = ["ขั้นเทพ", "แบบตะโกน", "300%", "ระดับพระกาฬ", "ทะลุมิติ", "ล้างสมอง", "ระดับกาแล็กซี", "ควันออกหู", "สิงร่าง", "อมตะ"];
        const prefixes = ["มหา", "สุดยอด", "โภคทรัพย์", "ควอนตัม", "เนตรสังสาระ", "จิตวิญญาณ", "จักรกล", "ไซเบอร์", "อนันต์", "สมองระเบิด"];

        for (let i = 0; i < 100; i++) {
            if (i < rawItems.length) {
                items.push({ ...rawItems[i], count: 0, id: i });
            } else {
                // สร้างไอเทมสุ่มแบบอิงตามดัชนี (i) เพื่อความสมดุลของเกม
                let baseItem = rawItems[i % rawItems.length];
                let scale = Math.pow(1.55, i - rawItems.length + 1);
                let p = prefixes[Math.floor(i / 10) % prefixes.length];
                let s = suffixes[i % suffixes.length];
                
                let cost = Math.round(rawItems[rawItems.length - 1].baseCost * Math.pow(2.1, i - rawItems.length + 1));
                let cpsAdd = baseItem.cpsAdd > 0 ? Math.round(baseItem.cpsAdd * scale * 10) : 0;
                let cpcAdd = baseItem.cpcAdd > 0 ? Math.round(baseItem.cpcAdd * scale * 5) : 0;

                items.push({
                    id: i,
                    name: `${p}${baseItem.name}${s}`,
                    baseCost: cost,
                    cpcAdd: cpcAdd,
                    cpsAdd: cpsAdd,
                    desc: cpsAdd > 0 ? `+${formatNumber(cpsAdd)} CPS` : `+${formatNumber(cpcAdd)} พลังคลิก`,
                    count: 0
                });
            }
        }

        // สูตรคำนวณราคาปัจจุบันตามจำนวนที่ซื้อไปแล้ว
        function getCost(item) {
            return Math.round(item.baseCost * Math.pow(1.15, item.count));
        }

        // จัดฟอร์แมตตัวเลขให้ดูง่าย (เช่น 1K, 1M, 1B, 1T)
        function formatNumber(num) {
            if (num >= 1e15) return (num / 1e15).toFixed(2) + ' Quadrillion';
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(num % 1 === 0 ? 0 : 1);
        }

        // สร้างปุ่มร้านค้าใน HTML
        const shopListEl = document.getElementById('shop-list');
        function initShop() {
            shopListEl.innerHTML = '';
            items.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'shop-item disabled';
                div.id = `item-${item.id}`;
                div.onclick = () => buyItem(item.id);
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-name">${item.id + 1}. ${item.name}</div>
                        <div class="item-cost" id="cost-${item.id}">ราคา: ${formatNumber(getCost(item))}</div>
                        <div class="item-effect">${item.desc}</div>
                    </div>
                    <div class="item-count" id="count-${item.id}">0</div>
                `;
                shopListEl.appendChild(div);
            });
        }

        // ระบบคลิกด้วยมือ
        document.getElementById('click-btn').addEventListener('click', (e) => {
            score += cpc;
            updateUI();
            createFloatingText(e.clientX, e.clientY, `+${formatNumber(cpc)}`);
            triggerChaosEffect(0.05);
        });

        // ระบบซื้อของ
        function buyItem(id) {
            const item = items[id];
            const cost = getCost(item);
            if (score >= cost) {
                score -= cost;
                item.count++;
                cpc += item.cpcAdd;
                calculateCPS();
                updateUI();
                totalChaosLevel++;
                triggerChaosEffect(0.5);
                
                // เอฟเฟกต์พิเศษเมื่อซื้อไอเทมระดับสูงขึ้นเรื่อยๆ
                if (item.count === 1 && id >= 6 && id % 4 === 2) {
                    spawnVideoOverlay();
                }
            }
        }

        function calculateCPS() {
            cps = items.reduce((sum, item) => sum + (item.count * item.cpsAdd), 0);
        }

        function updateUI() {
            document.getElementById('score-display').innerText = formatNumber(score);
            document.getElementById('cps-display').innerText = `ความฟินต่อวินาที (CPS): ${formatNumber(cps)} | พลังคลิก: ${formatNumber(cpc)}`;

            items.forEach((item) => {
                const cost = getCost(item);
                const el = document.getElementById(`item-${item.id}`);
                const costEl = document.getElementById(`cost-${item.id}`);
                const countEl = document.getElementById(`count-${item.id}`);

                costEl.innerText = `ราคา: ${formatNumber(cost)}`;
                countEl.innerText = item.count;

                if (score >= cost) {
                    el.classList.remove('disabled');
                } else {
                    el.classList.add('disabled');
                }
            });
        }

        // เอฟเฟกต์ตัวเลขลอยตอนคลิก
        function createFloatingText(x, y, text) {
            const txt = document.createElement('div');
            txt.className = 'floating-text';
            txt.innerText = text;
            txt.style.left = `${x}px`;
            txt.style.top = `${y}px`;
            txt.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 1500);
        }

        // ป่วนหน้าจอ (Brainrot Stimulation)
        function triggerChaosEffect(chance) {
            if (Math.random() > chance) return;
            
            // สุ่มเปลี่ยนสีพื้นหลังแวบๆ
            if (totalChaosLevel > 5) {
                document.getElementById('click-section').style.background = `radial-gradient(circle, hwb(${Math.random()*360} 10% 80%) 0%, #0a0a0c 100%)`;
                setTimeout(() => {
                    document.getElementById('click-section').style.background = 'radial-gradient(circle, #1a1a24 0%, #0a0a0c 100%)';
                }, 50);
            }

            // สุ่มสร้างข้อความเด้งไปมาในพื้นหลังเหมือน DVD Logo
            if (totalChaosLevel > 10 && document.querySelectorAll('.bouncing-bg').length < 10) {
                const words = ["SKIBIDI", "GYATT", "RIZZ", "SUBWAY SURFERS", "ASMR", "OHIO", "CHIGMA", "สมองไหล"];
                const b = document.createElement('div');
                b.className = 'bouncing-bg';
                b.innerText = words[Math.floor(Math.random() * words.length)];
                b.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                b.style.fontSize = `${Math.random() * 3 + 2}rem`;
                document.body.appendChild(b);

                let x = Math.random() * (window.innerWidth - 300);
                let y = Math.random() * (window.innerHeight - 100);
                let dx = (Math.random() - 0.5) * 6;
                let dy = (Math.random() - 0.5) * 6;

                setInterval(() => {
                    x += dx; y += dy;
                    if (x < 0 || x > window.innerWidth - 200) dx = -dx;
                    if (y < 0 || y > window.innerHeight - 50) dy = -dy;
                    b.style.left = x + 'px';
                    b.style.top = y + 'px';
                }, 30);
            }
        }

        // ฝังวิดีโอป่วนประสาท (จำลอง Subway Surfers และคลิปสั้น YouTube)
        const ytVideos = ["u779_59X_Rw", "jfKfPfyJRdk", "z376nHeS2K0", "n_Dv4JMiwK8"];
        function spawnVideoOverlay() {
            const vid = document.createElement('div');
            vid.className = 'video-popup';
            
            // สุ่มตำแหน่งหน้าจอ
            vid.style.left = `${Math.random() * (window.innerWidth - 300)}px`;
            vid.style.top = `${Math.random() * (window.innerHeight - 200)}px`;
            
            const id = ytVideos[Math.floor(Math.random() * ytVideos.length)];
            vid.innerHTML = `<iframe width="240" height="140" src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
            
            document.body.appendChild(vid);
        }

        // ลูปหลักปั๊มแต้มอัตโนมัติ (รันทุกๆ 100ms เพื่อความเนียน ไม่กระตุก)
        setInterval(() => {
            score += cps / 10;
            updateUI();
        }, 100);

        // เริ่มต้นเกม
        initShop();
        updateUI();
    </script>
</body>
</html>
