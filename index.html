<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Stimulation Clicker & Trading Pro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #0a0a0c; color: #fff;
            display: flex; height: 100vh; overflow: hidden;
        }
        /* Layout */
        #main-section {
            flex: 1; display: flex; flex-direction: column;
            background: radial-gradient(circle, #1a1a24 0%, #0a0a0c 100%);
            position: relative; overflow-y: auto; padding: 20px;
            align-items: center; justify-content: flex-start; gap: 15px;
        }
        #shop-section {
            width: 420px; border-left: 2px solid #222;
            background-color: #121216; display: flex;
            flex-direction: column; z-index: 10;
        }
        #shop-header {
            padding: 15px; background: #181822;
            border-bottom: 1px solid #222; text-align: center;
        }
        
        /* Search & Item Category Tabs */
        #search-container {
            padding: 12px 15px 5px 15px; background: #14141c;
        }
        #search-input {
            width: 100%; padding: 10px 12px;
            background-color: #1c1c24; border: 1px solid #444;
            border-radius: 6px; color: white; font-size: 0.95rem;
            outline: none; transition: border-color 0.2s;
        }
        #search-input:focus { border-color: #00ffcc; }
        
        #shop-tabs {
            display: flex; background: #14141c; padding: 5px 15px 10px 15px;
            border-bottom: 1px solid #222; gap: 8px;
        }
        .shop-tab {
            flex: 1; padding: 8px; font-size: 0.85rem; font-weight: bold;
            color: #888; background: #1c1c24; border: 1px solid #333;
            border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .shop-tab:hover { color: #fff; border-color: #555; }
        .shop-tab.active { color: #00ffcc; border-color: #00ffcc; background: rgba(0,255,204,0.05); }

        #shop-list {
            flex: 1; overflow-y: scroll; padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }
        
        /* Clicker UI */
        #click-panel { text-align: center; margin-top: 5px; }
        #score-display { font-size: 3.5rem; font-weight: 900; color: #00ffcc; text-shadow: 0 0 15px rgba(0,255,204,0.4); }
        #cps-display { font-size: 1.1rem; color: #888; margin-bottom: 12px; }
        #click-btn {
            width: 130px; height: 130px; border-radius: 50%;
            border: none; background: linear-gradient(135deg, #00ffcc, #0077ff);
            color: white; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 25px rgba(0,255,204,0.3);
            transition: transform 0.05s;
        }
        #click-btn:active { transform: scale(0.95); }

        /* --- Trading Area with Menu Bar --- */
        #invest-container {
            width: 100%; max-width: 500px; background: #13131a;
            border: 1px solid #222; border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column; margin-top: 10px;
        }
        #market-menu-bar {
            display: flex; background: #181824; border-bottom: 1px solid #222;
            overflow-x: auto; scrollbar-width: none;
        }
        .menu-tab {
            padding: 12px 16px; font-size: 0.9rem; font-weight: bold;
            color: #888; background: transparent; border: none;
            cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent;
            white-space: nowrap;
        }
        .menu-tab:hover { color: #fff; }
        .menu-tab.active { color: #00ffcc; border-bottom-color: #00ffcc; background: rgba(0,255,204,0.05); }

        /* Market Content Card */
        #trading-panel { padding: 15px; min-height: 220px; }
        .market-card { display: flex; flex-direction: column; gap: 12px; }
        .market-header { display: flex; justify-content: space-between; align-items: center; }
        .asset-name { font-weight: bold; font-size: 1.2rem; color: #fff; }
        .asset-price { font-weight: bold; font-size: 1.3rem; color: #ffcc00; }
        
        /* SVG Line Chart Container */
        .chart-container {
            width: 100%; height: 80px; background: #0f0f14;
            border-radius: 6px; overflow: hidden; position: relative;
            border: 1px solid #1a1a26;
        }
        .chart-svg { width: 100%; height: 100%; }

        .market-stats { 
            display: flex; flex-direction: column; gap: 6px; 
            background: #0d0d14; padding: 10px; border-radius: 8px; font-size: 0.85rem; color: #ccc;
        }
        .stat-row { display: flex; justify-content: space-between; }
        .pnl-positive { color: #00ff66; font-weight: bold; }
        .pnl-negative { color: #ff3344; font-weight: bold; }
        
        .trade-actions { display: flex; gap: 10px; margin-top: 5px; }
        .trade-btn {
            flex: 1; padding: 10px; border: none; border-radius: 6px;
            font-weight: bold; font-size: 0.95rem; cursor: pointer; color: white;
        }
        .btn-buy { background-color: #00c805; }
        .btn-buy:hover { background-color: #00a604; }
        .btn-sell { background-color: #ff3b30; }
        .btn-sell:hover { background-color: #d32f2f; }

        /* Shop Items */
        .shop-item {
            background: #1c1c24; border: 1px solid #333;
            padding: 12px; border-radius: 8px; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer;
        }
        .shop-item:hover:not(.disabled) { background: #252532; border-color: #00ffcc; }
        .shop-item.disabled { opacity: 0.3; cursor: not-allowed; }
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-name { font-weight: bold; font-size: 0.95rem; color: #fff; }
        .item-cost { font-size: 0.85rem; color: #ffcc00; }
        .item-effect { font-size: 0.75rem; color: #aaa; }
        .item-count { font-size: 1.3rem; font-weight: bold; color: #444; }
        .shop-item:not(.disabled) .item-count { color: #00ffcc; }

        .unlock-notice { color: #888; font-style: italic; font-size: 0.9rem; text-align: center; padding: 50px 10px; }
    </style>
</head>
<body>

    <div id="main-section">
        <div id="click-panel">
            <div id="score-display">0</div>
            <div id="cps-display">CPS: 0 | พลังคลิก: 1</div>
            <button id="click-btn">CLICK ME</button>
        </div>

        <div id="invest-container">
            <div id="market-menu-bar"></div>
            <div id="trading-panel">
                <div id="no-market-notice" class="unlock-notice">
                    ⚠️ ยังไม่มีพอร์ตลงทุน ซื้อ "ใบอนุมัติเทรด" ด้านขวาเพื่อเปิดเมนูหุ้น
                </div>
            </div>
        </div>
    </div>

    <div id="shop-section">
        <div id="shop-header">
            <h3>🛒 ตลาดละลายสมอง (100 ชิ้น)</h3>
        </div>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="🔍 พิมพ์ค้นหาไอเทมที่นี่..." oninput="filterShopItems()">
        </div>
        <div id="shop-tabs">
            <button class="shop-tab active" id="tab-upgrade" onclick="switchShopTab('upgrade')">🔋 อัปเกรดทั่วไป</button>
            <button class="shop-tab" id="tab-onetime" onclick="switchShopTab('onetime')">📜 ซื้อครั้งเดียวจบ</button>
        </div>
        <div id="shop-list"></div>
    </div>

    <script>
        let score = 0;
        let cpc = 1; 
        let cps = 0; 
        let currentActiveTab = null; 
        let currentShopTab = 'upgrade'; // เก็บหมวดหมู่ร้านค้าที่เลือกอยู่ ('upgrade' หรือ 'onetime')

        const marketData = {
            anthropic: { name: "Anthropic (Stock)", price: 120, owned: 0, invested: 0, history: [], unlocked: false, label: "Anthropic" },
            alphabet: { name: "Alphabet (Stock)", price: 170, owned: 0, invested: 0, history: [], unlocked: false, label: "Alphabet" },
            spacex: { name: "SpaceX (Stock)", price: 250, owned: 0, invested: 0, history: [], unlocked: false, label: "SpaceX" },
            bitcoin: { name: "Bitcoin (Crypto)", price: 65000, owned: 0, invested: 0, history: [], unlocked: false, label: "Bitcoin 🪙" }
        };

        const rawItems = [
            { name: "กดสิวฟินๆ", baseCost: 15, cpcAdd: 1, cpsAdd: 0 },
            { name: "คลิปสไลม์หนึบหนับ", baseCost: 50, cpcAdd: 0, cpsAdd: 0.5 },
            { name: "ทรายไฮดรอลิกโดนบด", baseCost: 120, cpcAdd: 0, cpsAdd: 2 },
            { name: "📜 ใบอนุมัติเทรด Anthropic", baseCost: 300, cpcAdd: 0, cpsAdd: 0, isUnlock: "anthropic" },
            { name: "วิดีโอตัดเค้กเนียนๆ", baseCost: 600, cpcAdd: 0, cpsAdd: 8 },
            { name: "ASMR เสียงเคี้ยวแตงกวา", baseCost: 1200, cpcAdd: 0, cpsAdd: 15 },
            { name: "💼 พอร์ตหุ้น Alphabet", baseCost: 2500, cpcAdd: 0, cpsAdd: 0, isUnlock: "alphabet" },
            { name: "Minecraft Parkour กระโดดลาวา", baseCost: 6000, cpcAdd: 0, cpsAdd: 60 },
            { name: "🚀 ตั๋วลงทุนระดับ VIP - SpaceX", baseCost: 14000, cpcAdd: 0, cpsAdd: 0, isUnlock: "spacex" },
            { name: "พอดแคสต์คดีฆาตกรรม", baseCost: 32000, cpcAdd: 0, cpsAdd: 300 },
            { name: "มุกสกีบีดี้โตเล็ตไอเดียกาว", baseCost: 75000, cpcAdd: 50, cpsAdd: 700 },
            { name: "🪙 กุญแจตู้เซฟคริปโต (Bitcoin)", baseCost: 150000, cpcAdd: 0, cpsAdd: 0, isUnlock: "bitcoin" }
        ];

        const items = [];
        const prefixes = ["มหา", "สุดยอด", "โภคทรัพย์", "ควอนตัม", "เนตรสังสาระ", "จิตวิญญาณ", "จักรกล", "ไซเบอร์", "อนันต์", "สมองระเบิด"];
        const suffixes = ["ขั้นเทพ", "แบบตะโกน", "300%", "ระดับพระกาฬ", "ทะลุมิติ", "ล้างสมอง", "ระดับกาแล็กซี", "ควันออกหู", "สิงร่าง", "อมตะ"];

        for (let i = 0; i < 100; i++) {
            if (i < rawItems.length) {
                let isOnetime = !!rawItems[i].isUnlock;
                let descText = isOnetime ? `🔓 เปิดเมนูเทรด ${rawItems[i].isUnlock}` : (rawItems[i].cpsAdd > 0 ? `+${rawItems[i].cpsAdd} CPS` : `+${rawItems[i].cpcAdd} พลังคลิก`);
                items.push({ ...rawItems[i], count: 0, id: i, desc: descText, isOnetime: isOnetime });
            } else {
                let baseItem = rawItems[i % rawItems.length];
                let scale = Math.pow(1.55, i - rawItems.length + 1);
                let p = prefixes[Math.floor(i / 10) % prefixes.length];
                let s = suffixes[i % suffixes.length];
                let cost = Math.round(rawItems[rawItems.length - 1].baseCost * Math.pow(2.1, i - rawItems.length + 1));
                let cpsAdd = baseItem.cpsAdd > 0 ? Math.round(baseItem.cpsAdd * scale * 10) : 0;
                let cpcAdd = baseItem.cpcAdd > 0 ? Math.round(baseItem.cpcAdd * scale * 5) : 0;

                // ไอเทมที่สเกลขึ้นมาหลังจาก 12 ชิ้นแรก จะถูกนับเป็นหมวดหมู่ซื้อซ้ำได้ (Upgrade) ทั้งหมดเพื่อความสนุกในการปั๊มแต้ม
                items.push({
                    id: i,
                    name: `${p}${baseItem.name.replace(/📜 |💼 |🚀 |🪙 /g, "")}${s}`,
                    baseCost: cost,
                    cpcAdd: cpcAdd,
                    cpsAdd: cpsAdd,
                    desc: `+${formatNumber(cpsAdd)} CPS`,
                    count: 0,
                    isOnetime: false 
                });
            }
        }

        function getCost(item) { 
            if(item.isOnetime && item.count > 0) return Infinity;
            return Math.round(item.baseCost * Math.pow(1.15, item.count)); 
        }

        function formatNumber(num) {
            if (num === Infinity) return "SOLD OUT";
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(num % 1 === 0 ? 0 : 1);
        }

        // --- ฟังก์ชันสลับแท็บหมวดหมู่ร้านค้า ---
        function switchShopTab(tabType) {
            currentShopTab = tabType;
            document.getElementById('tab-upgrade').classList.toggle('active', tabType === 'upgrade');
            document.getElementById('tab-onetime').classList.toggle('active', tabType === 'onetime');
            filterShopItems(); // รีเฟรชการแสดงผลไอเทมให้ตรงตามหมวดหมู่และคำค้นหา
        }

        // --- ฟังก์ชันกรองไอเทม (รวมทั้งระบบค้นหาและแบ่งหมวดหมู่) ---
        function filterShopItems() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            items.forEach(item => {
                const el = document.getElementById(`item-${item.id}`);
                if (el) {
                    // Check 1: ตรงตามหมวดหมู่ที่เลือกหรือไม่
                    const matchTab = (currentShopTab === 'onetime' && item.isOnetime) || (currentShopTab === 'upgrade' && !item.isOnetime);
                    // Check 2: ตรงตามข้อความที่พิมพ์ค้นหาหรือไม่
                    const matchSearch = item.name.toLowerCase().includes(searchText) || item.desc.toLowerCase().includes(searchText);

                    if (matchTab && matchSearch) {
                        el.style.display = 'flex';
                    } else {
                        el.style.display = 'none';
                    }
                }
            });
        }

        function rebuildMenuBar() {
            const menuBar = document.getElementById('market-menu-bar');
            menuBar.innerHTML = '';
            
            let hasAnyUnlock = false;
            Object.keys(marketData).forEach(key => {
                if (marketData[key].unlocked) {
                    hasAnyUnlock = true;
                    const btn = document.createElement('button');
                    btn.className = `menu-tab ${currentActiveTab === key ? 'active' : ''}`;
                    btn.innerText = marketData[key].label;
                    btn.onclick = () => switchTab(key);
                    menuBar.appendChild(btn);
                }
            });

            if (hasAnyUnlock && !currentActiveTab) {
                const firstKey = Object.keys(marketData).find(key => marketData[key].unlocked);
                switchTab(firstKey);
            }
        }

        function switchTab(key) {
            currentActiveTab = key;
            rebuildMenuBar();
            renderActiveMarketCard();
        }

        function unlockMarketCard(key) {
            marketData[key].unlocked = true;
            const asset = marketData[key];
            for(let i=0; i<40; i++) asset.history.push(asset.price);
            
            document.getElementById('no-market-notice').style.display = 'none';
            switchTab(key);
        }

        function renderActiveMarketCard() {
            const panel = document.getElementById('trading-panel');
            if (!currentActiveTab) return;
            
            const asset = marketData[currentActiveTab];
            const unitName = currentActiveTab === 'bitcoin' ? 'เหรียญ' : 'หุ้น';

            panel.innerHTML = `
                <div class="market-card">
                    <div class="market-header">
                        <span class="asset-name">${asset.name}</span>
                        <span class="asset-price" id="live-price">$${formatNumber(asset.price)}</span>
                    </div>
                    <div class="chart-container">
                        <svg class="chart-svg" id="live-line-chart"></svg>
                    </div>
                    <div class="market-stats">
                        <div class="stat-row"><span>จำนวนที่ถือครอง:</span> <span><b id="live-owned">${asset.owned}</b> ${unitName}</span></div>
                        <div class="stat-row"><span>เงินลงทุนรวม:</span> <span>$<span id="live-invested">${formatNumber(asset.invested)}</span></span></div>
                        <div class="stat-row"><span>กำไร/ขาดทุนสะสม:</span> <span id="live-pnl">$0 (0%)</span></div>
                    </div>
                    <div class="trade-actions">
                        <button class="trade-btn btn-buy" onclick="buyAsset('${currentActiveTab}')">ซื้อ 1 ${unitName === 'เหรียญ' ? 'เหรียญ' : 'หุ้น'}</button>
                        <button class="trade-btn btn-sell" onclick="sellAsset('${currentActiveTab}')">ขาย 1 ${unitName === 'เหรียญ' ? 'เหรียญ' : 'หุ้น'}</button>
                    </div>
                </div>
            `;
            renderLineChart();
            updateAssetStats();
        }

        function renderLineChart() {
            const svg = document.getElementById('live-line-chart');
            if (!svg || !currentActiveTab) return;
            
            const history = marketData[currentActiveTab].history;
            const min = Math.min(...history);
            const max = Math.max(...history);
            const range = max - min === 0 ? 1 : max - min;

            const width = svg.clientWidth || 470;
            const height = 80;

            let points = [];
            history.forEach((price, index) => {
                const x = (index / (history.length - 1)) * width;
                const y = height - (((price - min) / range) * (height - 20) + 10);
                points.push(`${x},${y}`);
            });

            const isUp = history[history.length - 1] >= history[history.length - 2];
            const strokeColor = isUp ? '#00c805' : '#ff3b30';

            svg.innerHTML = `
                <polyline fill="none" stroke="${strokeColor}" stroke-width="2.5" points="${points.join(' ')}" />
            `;
        }

        function updateMarketPrices() {
            Object.keys(marketData).forEach(key => {
                const asset = marketData[key];
                const pctChange = (Math.random() * 10.4 - 5) / 100;
                asset.price = Math.max(1, asset.price * (1 + pctChange));
                asset.history.push(asset.price);
                if(asset.history.length > 40) asset.history.shift();
            });

            if (currentActiveTab) {
                const asset = marketData[currentActiveTab];
                const priceEl = document.getElementById('live-price');
                if (priceEl) priceEl.innerText = `$${formatNumber(asset.price)}`;
                renderLineChart();
                updateAssetStats();
            }
        }

        function updateAssetStats() {
            if (!currentActiveTab) return;
            const asset = marketData[currentActiveTab];
            
            const ownedEl = document.getElementById('live-owned');
            const investedEl = document.getElementById('live-invested');
            const pnlEl = document.getElementById('live-pnl');
            
            if(!ownedEl || !investedEl || !pnlEl) return;

            ownedEl.innerText = asset.owned;
            investedEl.innerText = formatNumber(asset.invested);

            if (asset.owned === 0) {
                pnlEl.innerText = "$0 (0%)";
                pnlEl.className = "pnl-positive";
                return;
            }

            const currentTotalValue = asset.owned * asset.price;
            const pnlValue = currentTotalValue - asset.invested;
            const pnlPct = (pnlValue / (asset.invested || 1)) * 100;

            if (pnlValue >= 0) {
                pnlEl.innerText = `+$${formatNumber(pnlValue)} (+${pnlPct.toFixed(2)}%)`;
                pnlEl.className = "pnl-positive";
            } else {
                pnlEl.innerText = `-$${formatNumber(Math.abs(pnlValue))} (${pnlPct.toFixed(2)}%)`;
                pnlEl.className = "pnl-negative";
            }
        }

        function buyAsset(key) {
            const asset = marketData[key];
            const cost = asset.price;
            if (score >= cost) {
                score -= cost;
                asset.owned += 1;
                asset.invested += cost;
                updateUI();
                updateAssetStats();
            }
        }

        function sellAsset(key) {
            const asset = marketData[key];
            if (asset.owned >= 1) {
                const revenue = asset.price;
                score += revenue;
                
                const costPerUnit = asset.invested / asset.owned;
                asset.owned -= 1;
                asset.invested -= costPerUnit;
                if(asset.owned <= 0) { asset.owned = 0; asset.invested = 0; }

                updateUI();
                updateAssetStats();
            }
        }

        const shopListEl = document.getElementById('shop-list');
        function initShop() {
            shopListEl.innerHTML = '';
            items.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'shop-item disabled';
                div.id = `item-${item.id}`;
                div.onclick = () => buyItem(item.id);
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-name">${item.id + 1}. ${item.name}</div>
                        <div class="item-cost" id="cost-${item.id}">ราคา: ${formatNumber(getCost(item))}</div>
                        <div class="item-effect">${item.desc}</div>
                    </div>
                    <div class="item-count" id="count-${item.id}">0</div>
                `;
                shopListEl.appendChild(div);
            });
            filterShopItems(); // คัดแยกแท็บเริ่มต้นหลังจากสร้างเสร็จ
        }

        document.getElementById('click-btn').addEventListener('click', () => {
            score += cpc;
            updateUI();
        });

        function buyItem(id) {
            const item = items[id];
            const cost = getCost(item);
            if (score >= cost && (item.count === 0 || !item.isOnetime)) {
                score -= cost;
                item.count++;
                
                if (item.isUnlock) {
                    unlockMarketCard(item.isUnlock);
                } else {
                    cpc += item.cpcAdd;
                }
                
                calculateCPS();
                updateUI();
            }
        }

        function calculateCPS() {
            cps = items.reduce((sum, item) => sum + (item.count * item.cpsAdd), 0);
        }

        function updateUI() {
            document.getElementById('score-display').innerText = formatNumber(score);
            document.getElementById('cps-display').innerText = `CPS: ${formatNumber(cps)} | พลังคลิก: ${formatNumber(cpc)}`;

            items.forEach((item) => {
                const cost = getCost(item);
                const el = document.getElementById(`item-${item.id}`);
                const costEl = document.getElementById(`cost-${item.id}`);
                const countEl = document.getElementById(`count-${item.id}`);

                if(cost === Infinity) {
                    costEl.innerText = "ปลดล็อกแล้ว";
                    el.classList.add('disabled');
                    countEl.innerText = "✓";
                    return;
                }

                costEl.innerText = `ราคา: ${formatNumber(cost)}`;
                countEl.innerText = item.count;

                if (score >= cost) el.classList.remove('disabled');
                else el.classList.add('disabled');
            });
        }

        setInterval(() => {
            score += cps / 10;
            updateUI();
        }, 100);

        setInterval(() => {
            updateMarketPrices();
        }, 1000);

        initShop();
        updateUI();
    </script>
</body>
</html>
